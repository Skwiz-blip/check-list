<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantMind — Plan de développement</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10;
  --surface: #0d1117;
  --surface2: #131920;
  --border: #1e2d3d;
  --border2: #263545;
  --accent: #00e5a0;
  --accent2: #0090ff;
  --accent3: #ff6b35;
  --accent4: #c084fc;
  --text: #e2eaf4;
  --muted: #4d6478;
  --muted2: #7a9ab5;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 52px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

.logo-block { display: flex; flex-direction: column; gap: 6px; }

.logo {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
}

h1 {
  font-family: var(--sans);
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--text);
}

h1 span { color: var(--accent); }

.tagline {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted2);
  margin-top: 8px;
}

/* Global progress */
.global-progress {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  min-width: 220px;
  flex-shrink: 0;
}

.gp-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.gp-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.gp-count {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.gp-bar {
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}

.gp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

.gp-pct {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-top: 28px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border2); }

.stat-val {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  display: block;
}

.stat-val.blue { color: var(--accent2); }
.stat-val.orange { color: var(--accent3); }
.stat-val.purple { color: var(--accent4); }

.stat-lbl {
  font-size: 11px;
  color: var(--muted2);
  margin-top: 2px;
  font-family: var(--mono);
}

/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
}

.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* Phase sections */
.phase {
  margin-bottom: 28px;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.phase:hover { border-color: var(--border2); }
.phase.complete { border-color: rgba(0,229,160,0.3); }

.phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: var(--surface);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.phase-header:hover { background: var(--surface2); }

.phase-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  min-width: 32px;
}

.phase-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.phase-title {
  flex: 1;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.phase-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  margin-top: 2px;
  font-weight: 400;
}

.phase-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.phase-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  color: var(--muted2);
  transition: all 0.2s;
}

.phase-badge.done {
  background: rgba(0,229,160,0.1);
  border-color: rgba(0,229,160,0.4);
  color: var(--accent);
}

.phase-pbar {
  width: 60px; height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.phase-pfill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.chevron {
  width: 16px; height: 16px;
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
}

.chevron svg { width: 16px; height: 16px; }

.phase.open .chevron { transform: rotate(90deg); }

/* Steps inside phase */
.phase-body {
  display: none;
  border-top: 1px solid var(--border);
}

.phase.open .phase-body { display: block; }

.step {
  border-bottom: 1px solid var(--border);
}

.step:last-child { border-bottom: none; }

.step-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  cursor: pointer;
  transition: background 0.15s;
}

.step-header:hover { background: var(--surface2); }

.step-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  min-width: 28px;
}

.step-title {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted2);
}

.step-chevron {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  transition: transform 0.2s;
}

.step.open .step-chevron { transform: rotate(90deg); }

.step-body { display: none; padding: 4px 0 8px 60px; }
.step.open .step-body { display: block; }

/* Items */
.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 20px 8px 0;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.1s;
}

.item:hover { background: rgba(255,255,255,0.03); }

.cb {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.cb svg { display: none; width: 10px; height: 10px; }

.item.done .cb {
  background: var(--accent);
  border-color: var(--accent);
}

.item.done .cb svg { display: block; }

.item-content { flex: 1; }

.item-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
  transition: color 0.15s, text-decoration 0.15s;
}

.item.done .item-text {
  color: var(--muted);
  text-decoration: line-through;
}

.item-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}

.tag {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 700;
}

.tag-ml    { background: rgba(192,132,252,0.12); color: #c084fc; border: 1px solid rgba(192,132,252,0.2); }
.tag-data  { background: rgba(0,144,255,0.12); color: #60b4ff; border: 1px solid rgba(0,144,255,0.2); }
.tag-rl    { background: rgba(255,107,53,0.12); color: #ff8f65; border: 1px solid rgba(255,107,53,0.2); }
.tag-api   { background: rgba(0,229,160,0.10); color: #00e5a0; border: 1px solid rgba(0,229,160,0.2); }
.tag-ui    { background: rgba(250,204,21,0.10); color: #d4a90a; border: 1px solid rgba(250,204,21,0.15); }
.tag-ops   { background: rgba(248,113,113,0.10); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
.tag-doc   { background: rgba(148,163,184,0.10); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }

/* Priority */
.priority {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-top: 4px;
  display: inline-block;
}
.priority.high { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
.priority.med  { background: rgba(250,204,21,0.1); color: #d4a90a; border: 1px solid rgba(250,204,21,0.15); }
.priority.low  { background: rgba(100,116,139,0.1); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }

/* Week badge */
.week-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 8px;
}

.week-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Role badge in step header */
.role-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
  flex-shrink: 0;
}

/* Submenu toggle */
.actions {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(8,12,16,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 10px 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 14px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--accent);
  color: var(--accent);
}

.btn.active {
  background: rgba(0,229,160,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

/* Completion flash */
@keyframes flash {
  0%  { background: rgba(0,229,160,0.15); }
  100%{ background: transparent; }
}
.item.flashing { animation: flash 0.5s ease-out; }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="header-top">
      <div class="logo-block">
        <div class="logo">// QuantMind — Dev Tracker</div>
        <h1>Plan de<br><span>développement</span></h1>
        <div class="tagline">Plateforme d'analyse financière IA · LSTM + RL + FastAPI + React</div>
      </div>
      <div class="global-progress">
        <div class="gp-top">
          <span class="gp-label">Progression globale</span>
          <span class="gp-count" id="gp-count">0/62</span>
        </div>
        <div class="gp-bar"><div class="gp-fill" id="gp-fill"></div></div>
        <div class="gp-pct" id="gp-pct">0% complété</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-val" id="stat-done">0</span>
        <div class="stat-lbl">Tâches faites</div>
      </div>
      <div class="stat-card">
        <span class="stat-val blue" id="stat-remain">62</span>
        <div class="stat-lbl">Restantes</div>
      </div>
      <div class="stat-card">
        <span class="stat-val orange">4</span>
        <div class="stat-lbl">Semaines</div>
      </div>
      <div class="stat-card">
        <span class="stat-val purple">6</span>
        <div class="stat-lbl">Phases</div>
      </div>
      <div class="stat-card">
        <span class="stat-val" style="color:#60b4ff">3</span>
        <div class="stat-lbl">Membres équipe</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div>ML / LSTM</div>
      <div class="legend-item"><div class="legend-dot" style="background:#60b4ff"></div>Data</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff8f65"></div>RL / Trading</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div>API</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d4a90a"></div>UI / Frontend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>DevOps</div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div>Documentation</div>
    </div>
  </header>

  <div class="actions">
    <button class="btn" onclick="expandAll()">Tout ouvrir</button>
    <button class="btn" onclick="collapseAll()">Tout fermer</button>
    <button class="btn" onclick="resetAll()">Réinitialiser</button>
    <button class="btn" onclick="filterUndone()" id="btn-filter">Voir non faits</button>
    <button class="btn" onclick="exportProgress()">Exporter JSON</button>
  </div>

  <div id="phases-container" style="margin-top: 24px;"></div>

</div>

<script>
const phases = [
  {
    id:'p1', num:'PHASE 01', icon:'🗄️', color:'rgba(0,144,255,0.15)', borderColor:'rgba(0,144,255,0.4)',
    title:'Data Engineering', sub:'Acquisition · EDA · Preprocessing',
    week:1, weekColor:'#60b4ff', member:'Membre 1 — Data Engineer',
    steps:[
      {
        id:'s1', num:'1.1', title:'Acquisition des données',
        role:'Data Engineer', roleColor:'rgba(0,144,255,0.15)', roleText:'#60b4ff',
        items:[
          {id:'i1', text:'Télécharger le dataset Kaggle (US Stocks & ETFs historiques)', tags:['data'], priority:'high'},
          {id:'i2', text:'Configurer l\'API Kaggle (kaggle.json, credentials)', tags:['data','ops'], priority:'high'},
          {id:'i3', text:'Installer yfinance et tester la récupération de données récentes', tags:['data'], priority:'high'},
          {id:'i4', text:'Sélectionner les 6 actifs cibles : AAPL, TSLA, GOOGL, MSFT, BTC-USD, ETH-USD', tags:['data'], priority:'high'},
          {id:'i5', text:'Exporter chaque actif en CSV sur 5 ans dans /data/raw/', tags:['data'], priority:'med'},
          {id:'i6', text:'Vérifier la continuité temporelle (pas de jours manquants en semaine)', tags:['data'], priority:'med'},
        ]
      },
      {
        id:'s2', num:'1.2', title:'EDA — Analyse exploratoire',
        role:'Data Engineer', roleColor:'rgba(0,144,255,0.15)', roleText:'#60b4ff',
        items:[
          {id:'i7', text:'Créer le notebook eda.ipynb dans /notebooks/', tags:['data','doc'], priority:'high'},
          {id:'i8', text:'Visualiser la distribution des prix de clôture pour chaque actif', tags:['data','ui'], priority:'high'},
          {id:'i9', text:'Identifier et documenter les valeurs manquantes (isnull, heatmap)', tags:['data'], priority:'high'},
          {id:'i10', text:'Analyser les volumes échangés (pics, anomalies)', tags:['data'], priority:'med'},
          {id:'i11', text:'Calculer la matrice de corrélation entre les 6 actifs', tags:['data','ui'], priority:'med'},
          {id:'i12', text:'Visualiser les returns journaliers (pct_change) et leur distribution', tags:['data','ui'], priority:'med'},
          {id:'i13', text:'Documenter les observations clés dans le notebook (markdown cells)', tags:['doc'], priority:'low'},
        ]
      },
      {
        id:'s3', num:'1.3', title:'Calcul des indicateurs techniques',
        role:'Data Engineer', roleColor:'rgba(0,144,255,0.15)', roleText:'#60b4ff',
        items:[
          {id:'i14', text:'Implémenter le calcul du RSI (période 14)', tags:['data','ml'], priority:'high'},
          {id:'i15', text:'Implémenter le MACD (12, 26, 9) et signal line', tags:['data','ml'], priority:'high'},
          {id:'i16', text:'Calculer les Bandes de Bollinger (20 jours, 2σ)', tags:['data','ml'], priority:'med'},
          {id:'i17', text:'Calculer EMA_20 et EMA_50', tags:['data','ml'], priority:'high'},
          {id:'i18', text:'Calculer l\'ATR (Average True Range) pour mesurer la volatilité', tags:['data','ml'], priority:'med'},
          {id:'i19', text:'Sauvegarder les datasets enrichis dans /data/processed/', tags:['data'], priority:'high'},
        ]
      },
      {
        id:'s4', num:'1.4', title:'Preprocessing LSTM',
        role:'Data Engineer', roleColor:'rgba(0,144,255,0.15)', roleText:'#60b4ff',
        items:[
          {id:'i20', text:'Normaliser toutes les features avec MinMaxScaler [0, 1]', tags:['data','ml'], priority:'high'},
          {id:'i21', text:'Créer les séquences glissantes (window = 60 jours → J+1)', tags:['data','ml'], priority:'high'},
          {id:'i22', text:'Split temporel : 80% train / 10% val / 10% test (sans shuffle)', tags:['data','ml'], priority:'high'},
          {id:'i23', text:'Sauvegarder le scaler fitted (scaler.pkl) dans /models/', tags:['data','ml'], priority:'high'},
          {id:'i24', text:'Vérifier l\'absence de data leakage (scaler fitté uniquement sur train)', tags:['data','ml'], priority:'high'},
        ]
      }
    ]
  },
  {
    id:'p2', num:'PHASE 02', icon:'🧠', color:'rgba(192,132,252,0.12)', borderColor:'rgba(192,132,252,0.4)',
    title:'Modèle LSTM', sub:'Architecture · Entraînement · Évaluation',
    week:2, weekColor:'#c084fc', member:'Membre 1 — ML Engineer',
    steps:[
      {
        id:'s5', num:'2.1', title:'Architecture du réseau LSTM',
        role:'ML Engineer', roleColor:'rgba(192,132,252,0.12)', roleText:'#c084fc',
        items:[
          {id:'i25', text:'Créer le fichier lstm_model.py dans /models/', tags:['ml'], priority:'high'},
          {id:'i26', text:'Implémenter 2 couches LSTM (128 → 64 unités) avec return_sequences', tags:['ml'], priority:'high'},
          {id:'i27', text:'Ajouter Dropout(0.2) après chaque couche LSTM', tags:['ml'], priority:'high'},
          {id:'i28', text:'Ajouter BatchNormalization avant la couche Dense finale', tags:['ml'], priority:'med'},
          {id:'i29', text:'Configurer l\'optimizer Adam avec learning_rate=0.001', tags:['ml'], priority:'high'},
          {id:'i30', text:'Définir la loss MSE + métrique MAE', tags:['ml'], priority:'high'},
        ]
      },
      {
        id:'s6', num:'2.2', title:'Entraînement et callbacks',
        role:'ML Engineer', roleColor:'rgba(192,132,252,0.12)', roleText:'#c084fc',
        items:[
          {id:'i31', text:'Configurer EarlyStopping (patience=10, monitor val_loss)', tags:['ml'], priority:'high'},
          {id:'i32', text:'Configurer ModelCheckpoint pour sauvegarder le meilleur modèle', tags:['ml'], priority:'high'},
          {id:'i33', text:'Configurer ReduceLROnPlateau (factor=0.5, patience=5)', tags:['ml'], priority:'med'},
          {id:'i34', text:'Lancer l\'entraînement (50 epochs max, batch_size=32)', tags:['ml'], priority:'high'},
          {id:'i35', text:'Visualiser les courbes loss/val_loss dans un graphique', tags:['ml','ui'], priority:'med'},
          {id:'i36', text:'Sauvegarder le modèle final : lstm_model.h5', tags:['ml'], priority:'high'},
        ]
      },
      {
        id:'s7', num:'2.3', title:'Évaluation du modèle',
        role:'ML Engineer', roleColor:'rgba(192,132,252,0.12)', roleText:'#c084fc',
        items:[
          {id:'i37', text:'Calculer RMSE sur le jeu de test (inverse-transform les prédictions)', tags:['ml'], priority:'high'},
          {id:'i38', text:'Calculer MAE et MAPE sur le jeu de test', tags:['ml'], priority:'high'},
          {id:'i39', text:'Calculer la Directional Accuracy (% de directions correctes)', tags:['ml'], priority:'high'},
          {id:'i40', text:'Comparer prédiction vs réel sur un graphique (test set)', tags:['ml','ui'], priority:'high'},
          {id:'i41', text:'Documenter les résultats dans le rapport (tableau métriques)', tags:['doc'], priority:'high'},

let allItems = {};
let filterActive = false;

const CHECKLIST_LIST = (() => {
  const file = (location.pathname.split('/').pop() || 'index').replace('.html', '');
  return file || 'index';
})();

let syncInFlight = false;

async function apiGetState(){
  const res = await fetch(`/api/items?list=${encodeURIComponent(CHECKLIST_LIST)}&t=${Date.now()}`, { cache: 'no-store' });
  if(!res.ok) throw new Error(`GET /api/items failed: ${res.status}`);
  return await res.json();
}

async function apiSetItem(id, done){
  const res = await fetch(`/api/items?list=${encodeURIComponent(CHECKLIST_LIST)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, done: !!done })
  });
  if(!res.ok) throw new Error(`PUT /api/items failed: ${res.status}`);
}

async function apiClear(){
  const res = await fetch(`/api/items?list=${encodeURIComponent(CHECKLIST_LIST)}`, { method: 'DELETE' });
  if(!res.ok) throw new Error(`DELETE /api/items failed: ${res.status}`);
}

function applyFilterVisibility(){
  if(!filterActive) return;
  Object.values(allItems).forEach(item => {
    const el = document.getElementById('item-'+item.id);
    if(!el) return;
    if(item.done) el.style.display = 'none';
    else el.style.display = 'flex';
  });
}

async function syncFromServer(){
  if(syncInFlight) return;
  syncInFlight = true;
  try {
    const data = await apiGetState();
    const remote = (data && data.items) ? data.items : {};

    Object.keys(allItems).forEach(id => {
      const done = !!remote[id];
      allItems[id].done = done;
      const el = document.getElementById('item-' + id);
      if(el) el.classList.toggle('done', done);
    });

    updateProgress();
    applyFilterVisibility();
  } catch (e) {
    console.warn('Checklist sync failed:', e);
  } finally {
    syncInFlight = false;
  }
}

function buildDOM(){
  const container = document.getElementById('phases-container');
  phases.forEach(ph => {
    const phDiv = document.createElement('div');
    phDiv.className = 'phase open';
    phDiv.id = ph.id;
    phDiv.style.borderColor = ph.borderColor.replace('0.4','0.2');

    // Phase header
    phDiv.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <span class="phase-num">${ph.num}</span>
        <div class="phase-icon" style="background:${ph.color}">${ph.icon}</div>
        <div style="flex:1">
          <div class="phase-title">${ph.title}</div>
          <div class="phase-sub">${ph.sub}</div>
        </div>
        <div class="phase-meta">
          <span class="week-badge" style="border-color:${ph.weekColor}30;color:${ph.weekColor}">
            <span class="week-dot" style="background:${ph.weekColor}"></span>
            Semaine ${ph.week}
          </span>
          <div class="phase-pbar"><div class="phase-pfill" id="pfill-${ph.id}" style="background:${ph.borderColor.replace('0.4','0.8')}; width:0%"></div></div>
          <span class="phase-badge" id="pbadge-${ph.id}">0/${ph.steps.reduce((a,s)=>a+s.items.length,0)}</span>
          <div class="chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,4 10,8 6,12"/></svg></div>
        </div>
      </div>
      <div class="phase-body" id="pbody-${ph.id}"></div>
    `;

    const pbody = phDiv.querySelector(`#pbody-${ph.id}`);
    ph.steps.forEach(step => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'step open';
      stepDiv.id = step.id;

      stepDiv.innerHTML = `
        <div class="step-header" onclick="toggleStep('${step.id}')">
          <span class="step-num">${step.num}</span>
          <div style="flex:1">
            <div class="step-title">${step.title}</div>
          </div>
          <span class="role-badge" style="background:${step.roleColor};color:${step.roleText};border:1px solid ${step.roleText}30">${step.role}</span>
          <span class="step-chevron">▶</span>
        </div>
        <div class="step-body" id="sbody-${step.id}"></div>
      `;

      const sbody = stepDiv.querySelector(`#sbody-${step.id}`);
      step.items.forEach(item => {
        allItems[item.id] = { ...item, phaseId: ph.id, stepId: step.id, done: false };
        const el = document.createElement('div');
        el.className = 'item';
        el.id = 'item-' + item.id;
        el.onclick = () => toggleItem(item.id);
        el.innerHTML = `
          <div class="cb" id="cb-${item.id}">
            <svg viewBox="0 0 10 8" fill="none" stroke="var(--bg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1,4 4,7 9,1"/>
            </svg>
          </div>
          <div class="item-content">
            <div class="item-text">${item.text}</div>
            <div class="item-tags">
              ${item.tags.map(t=>`<span class="tag tag-${t}">${t.toUpperCase()}</span>`).join('')}
              <span class="priority ${item.priority}">${item.priority === 'high' ? '⬆ PRIORITÉ HAUTE' : item.priority === 'med' ? '➡ MOYENNE' : '⬇ FAIBLE'}</span>
            </div>
          </div>
        `;
        sbody.appendChild(el);
      });

      pbody.appendChild(stepDiv);
    });

    container.appendChild(phDiv);
  });
  updateProgress();
}

function toggleItem(id){
  const item = allItems[id];
  item.done = !item.done;
  const el = document.getElementById('item-' + id);
  el.classList.toggle('done', item.done);
  el.classList.add('flashing');
  setTimeout(() => el.classList.remove('flashing'), 500);
  updateProgress();
  applyFilterVisibility();
  apiSetItem(id, item.done).catch(e => console.warn('Checklist save failed:', e));
}

function togglePhase(id){
  const ph = document.getElementById(id);
  ph.classList.toggle('open');
}

function toggleStep(id){
  const s = document.getElementById(id);
  s.classList.toggle('open');
  const sbody = document.getElementById('sbody-'+id);
  if(s.classList.contains('open')) sbody.style.display = 'block';
  else sbody.style.display = 'none';
}

function updateProgress(){
  const total = Object.keys(allItems).length;
  const done = Object.values(allItems).filter(i=>i.done).length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('gp-count').textContent = `${done}/${total}`;
  document.getElementById('gp-fill').style.width = pct + '%';
  document.getElementById('gp-pct').textContent = pct + '% complété';
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-remain').textContent = total - done;

  phases.forEach(ph => {
    const phItems = ph.steps.flatMap(s => s.items.map(i => i.id));
    const phDone = phItems.filter(id => allItems[id].done).length;
    const phTotal = phItems.length;
    const pct2 = phTotal ? Math.round(phDone/phTotal*100) : 0;
    const badge = document.getElementById('pbadge-' + ph.id);
    const fill = document.getElementById('pfill-' + ph.id);
    if(badge){ badge.textContent = `${phDone}/${phTotal}`; badge.classList.toggle('done', phDone === phTotal); }
    if(fill){ fill.style.width = pct2 + '%'; }
    const phEl = document.getElementById(ph.id);
    if(phEl) phEl.classList.toggle('complete', phDone === phTotal);
  });
}

function expandAll(){
  phases.forEach(ph => {
    const phEl = document.getElementById(ph.id);
    phEl.classList.add('open');
    ph.steps.forEach(s => {
      const sEl = document.getElementById(s.id);
      sEl.classList.add('open');
      document.getElementById('sbody-'+s.id).style.display = 'block';
    });
  });
}

function collapseAll(){
  phases.forEach(ph => {
    const phEl = document.getElementById(ph.id);
    phEl.classList.remove('open');
    ph.steps.forEach(s => {
      const sEl = document.getElementById(s.id);
      sEl.classList.remove('open');
      document.getElementById('sbody-'+s.id).style.display = 'none';
    });
  });
}

function resetAll(){
  if(!confirm('Réinitialiser toute la progression ?')) return;
  Object.keys(allItems).forEach(id => {
    allItems[id].done = false;
    document.getElementById('item-'+id).classList.remove('done');
  });
  updateProgress();
  applyFilterVisibility();
  apiClear().catch(e => console.warn('Checklist reset failed:', e));
}

function filterUndone(){
  filterActive = !filterActive;
  const btn = document.getElementById('btn-filter');
  btn.classList.toggle('active', filterActive);
  btn.textContent = filterActive ? 'Voir tout' : 'Voir non faits';
  Object.values(allItems).forEach(item => {
    const el = document.getElementById('item-'+item.id);
    if(filterActive && item.done) el.style.display = 'none';
    else el.style.display = 'flex';
  });
}

function exportProgress(){
  const data = {
    date: new Date().toISOString(),
    list: CHECKLIST_LIST,
    progress: {
      total: Object.keys(allItems).length,
      done: Object.values(allItems).filter(i=>i.done).length
    },
    items: Object.values(allItems).map(i => ({ id: i.id, text: i.text, done: i.done, phase: i.phaseId }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quantmind_progress.json';
  a.click();
}

async function init(){
  buildDOM();
  await syncFromServer();
  setInterval(syncFromServer, 5000);
}

init();
